<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Should I Eat This?</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { min-height: 100vh; background: #faf7f2; background-image: radial-gradient(ellipse at 20% 0%, #ffe4b5 0%, transparent 50%), radial-gradient(ellipse at 80% 100%, #ffd6a0 0%, transparent 50%); font-family: Georgia, serif; display: flex; flex-direction: column; align-items: center; padding: 36px 16px 64px; }
.header { text-align: center; margin-bottom: 36px; }
.header .icon { font-size: 52px; margin-bottom: 10px; }
.header h1 { font-size: clamp(26px, 6vw, 40px); font-weight: bold; color: #3d1f00; margin-bottom: 6px; }
.header p { color: #8a5c2e; font-size: 15px; font-style: italic; }
.card { background: white; border-radius: 24px; padding: 28px; box-shadow: 0 8px 40px rgba(61,31,0,0.10); width: 100%; max-width: 540px; margin-bottom: 24px; }
.card label { display: block; font-weight: 700; color: #3d1f00; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.row { display: flex; gap: 10px; }
input { flex: 1; padding: 13px 16px; font-size: 16px; border: 2px solid #e8d5b7; border-radius: 14px; outline: none; font-family: inherit; color: #3d1f00; }
input:focus { border-color: #d4870a; }
input::placeholder { color: #bba07a; }
button { padding: 13px 22px; border: none; border-radius: 14px; font-size: 18px; cursor: pointer; background: linear-gradient(135deg, #d4870a, #b8650a); color: white; }
button:disabled { background: #e0d4c0; color: #aaa; cursor: not-allowed; }
.loading { display: none; margin-top: 14px; align-items: center; gap: 10px; padding: 12px 16px; background: #fdf3e3; border-radius: 14px; border: 1.5px solid #e8d5b7; }
.loading.on { display: flex; }
.ring { width:18px; height:18px; border:2px solid #e8d5b7; border-top-color:#d4870a; border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
.loading p { color: #8a5c2e; font-size: 14px; font-style: italic; margin: 0; }
.err { display: none; margin-top: 12px; background: #fff5f5; border-radius: 12px; padding: 12px; border: 1.5px solid #ffcdd2; color: #c62828; font-size: 12px; }
.err.on { display: block; }
.result { display: none; width: 100%; max-width: 540px; margin-bottom: 28px; border-radius: 24px; padding: 28px; }
.result.on { display: block; animation: pop 0.4s ease; }
.big-answer { text-align: center; padding: 20px 16px 24px; border-radius: 18px; margin-bottom: 20px; }
.big-answer .answer-emoji { font-size: 56px; margin-bottom: 8px; }
.big-answer .answer-text { font-size: 32px; font-weight: 800; letter-spacing: -0.5px; }
.big-answer .answer-sub { font-size: 15px; margin-top: 6px; font-style: italic; opacity: 0.85; }
.divider { height: 1px; background: rgba(0,0,0,0.08); margin: 4px 0 20px; }
.rhead { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.remoji { font-size: 36px; }
.rfood { font-size: 17px; font-weight: 800; }
.srow { display: flex; justify-content: space-between; margin: 4px 0; }
.srow span { font-size: 11px; font-weight: 700; color: #888; letter-spacing: 1px; text-transform: uppercase; }
.srow strong { font-size: 13px; font-weight: 800; }
.track { height: 8px; background: #e0e0e0; border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
.fill { height: 100%; border-radius: 99px; transition: width 0.8s cubic-bezier(.4,0,.2,1); width: 0; }
.rwhy { font-size: 14px; line-height: 1.7; margin-bottom: 14px; }
.rtip { background: rgba(255,255,255,0.65); border-radius: 12px; padding: 12px 16px; font-size: 13px; line-height: 1.6; margin-bottom: 14px; }
.rsrc { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.srclbl { font-size: 11px; font-weight: 700; text-transform: uppercase; }
.srctag { background: rgba(255,255,255,0.75); border-radius: 99px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
.prev { width: 100%; max-width: 540px; }
.prev h4 { font-size: 11px; color: #a07848; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 10px; }
.plist { display: flex; flex-direction: column; gap: 8px; }
.pitem { background: white; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border: 1.5px solid #e8d5b7; }
.pemoji { font-size: 22px; }
.pinfo { flex: 1; min-width: 0; }
.pfood { font-weight: 700; font-size: 14px; color: #3d1f00; }
.phl { font-size: 12px; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pbadge { color: white; border-radius: 99px; padding: 3px 10px; font-size: 11px; font-weight: 800; flex-shrink: 0; }
@keyframes pop { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="header">
  <div class="icon">🌮</div>
  <h1>Should I Eat This?</h1>
  <p>Mexico travel food safety · CDC &amp; WHO guidelines</p>
</div>
<div class="card">
  <label>What are you thinking of eating or drinking?</label>
  <div class="row">
    <input id="inp" type="text" placeholder="e.g. gelato, ceviche, agua fresca…" />
    <button id="btn" onclick="go()">→</button>
  </div>
  <div class="loading" id="load"><div class="ring"></div><p>Checking health guidelines…</p></div>
  <div class="err" id="err"></div>
</div>
<div class="result" id="res">
  <div class="big-answer" id="bigAnswer">
    <div class="answer-emoji" id="answerEmoji"></div>
    <div class="answer-text" id="answerText"></div>
    <div class="answer-sub" id="answerSub"></div>
  </div>
  <div class="divider"></div>
  <div class="rhead">
    <div class="remoji" id="rEmoji"></div>
    <div><div class="rfood" id="rFood"></div></div>
  </div>
  <div class="srow"><span>Confidence Score</span><strong id="rNum"></strong></div>
  <div class="track"><div class="fill" id="rFill"></div></div>
  <div class="rwhy" id="rWhy"></div>
  <div class="rtip" id="rTip"></div>
  <div class="rsrc" id="rSrc"></div>
</div>
<div class="prev" id="prev" style="display:none">
  <h4>Earlier checks</h4>
  <div class="plist" id="plist"></div>
</div>
<script>
var V = {
  SAFE:    { bg:"linear-gradient(135deg,#e8f5e9,#c8e6c9)", border:"#4caf50", text:"#1b5e20", accent:"#2e7d32", bar:"#43a047", answerBg:"#e8f5e9", answerEmoji:"✅", answerText:"Yes, go for it!", answerColor:"#1b5e20", pbg:"#43a047" },
  CAUTION: { bg:"linear-gradient(135deg,#fff8e1,#ffecb3)", border:"#ffa726", text:"#e65100", accent:"#f57c00", bar:"#ffa726", answerBg:"#fff8e1", answerEmoji:"⚠️", answerText:"Choose carefully", answerColor:"#e65100", pbg:"#f57c00" },
  AVOID:   { bg:"linear-gradient(135deg,#ffebee,#ffcdd2)", border:"#ef5350", text:"#b71c1c", accent:"#c62828", bar:"#ef5350", answerBg:"#ffebee", answerEmoji:"🚫", answerText:"Skip this one", answerColor:"#b71c1c", pbg:"#c62828" }
};
var log = [];
var going = false;
document.getElementById("inp").onkeydown = function(e){ if(e.key==="Enter") go(); };
function go() {
  var food = document.getElementById("inp").value.trim();
  if (!food || going) return;
  going = true;
  document.getElementById("btn").disabled = true;
  document.getElementById("load").classList.add("on");
  document.getElementById("err").classList.remove("on");
  document.getElementById("res").classList.remove("on");
  fetch("/.netlify/functions/check", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ food: food })
  })
  .then(function(r){ return r.text().then(function(t){ return {ok:r.ok, body:t}; }); })
  .then(function(r){
    if (!r.ok) throw new Error(r.body.slice(0, 200));
    var p = JSON.parse(r.body);
    if (p.error) throw new Error(p.error);
    p.score = Math.max(1, Math.min(10, Number(p.score)||5));
    p.verdict = p.score>=7 ? "SAFE" : p.score>=4 ? "CAUTION" : "AVOID";
    render(p, food);
    addLog(p, food);
    document.getElementById("inp").value = "";
  })
  .catch(function(e){ var el = document.getElementById("err"); el.textContent = e.message; el.classList.add("on"); })
  .finally(function(){ going = false; document.getElementById("btn").disabled = false; document.getElementById("load").classList.remove("on"); });
}
function render(p, food) {
  var v = V[p.verdict];
  var res = document.getElementById("res");
  res.style.background = v.bg; res.style.border = "2px solid "+v.border; res.style.boxShadow = "0 8px 40px "+v.border+"44";
  document.getElementById("bigAnswer").style.background = v.answerBg;
  document.getElementById("answerEmoji").textContent = v.answerEmoji;
  document.getElementById("answerText").textContent = v.answerText;
  document.getElementById("answerText").style.color = v.answerColor;
  document.getElementById("answerSub").textContent = p.headline;
  document.getElementById("answerSub").style.color = v.accent;
  document.getElementById("rEmoji").textContent = p.emoji||"🍽️";
  document.getElementById("rFood").textContent = food;
  document.getElementById("rFood").style.color = v.text;
  document.getElementById("rNum").textContent = p.score+"/10";
  document.getElementById("rNum").style.color = v.accent;
  var f = document.getElementById("rFill"); f.style.background = v.bar; f.style.width = "0";
  setTimeout(function(){ f.style.width = (p.score/10*100)+"%"; }, 100);
  document.getElementById("rWhy").textContent = p.why;
  document.getElementById("rWhy").style.color = v.accent;
  document.getElementById("rTip").innerHTML = "<strong>💡 Tip:</strong> "+p.tip;
  document.getElementById("rTip").style.color = v.text;
  var src = document.getElementById("rSrc"); src.innerHTML = "";
  if (p.sources && p.sources.length) {
    var l = document.createElement("span"); l.className="srclbl"; l.style.color=v.accent; l.textContent="Based on:"; src.appendChild(l);
    p.sources.forEach(function(s){ var g=document.createElement("span"); g.className="srctag"; g.style.border="1px solid "+v.border; g.style.color=v.text; g.textContent=s; src.appendChild(g); });
  }
  res.classList.add("on");
}
function addLog(p, food) {
  log.unshift({score:p.score,verdict:p.verdict,headline:p.headline,emoji:p.emoji,food:food});
  if (log.length > 6) log.pop();
  if (log.length < 2) return;
  document.getElementById("prev").style.display = "block";
  var pl = document.getElementById("plist"); pl.innerHTML = "";
  log.slice(1).forEach(function(h){
    var v = V[h.verdict]||V.CAUTION;
    var el = document.createElement("div"); el.className="pitem";
    el.innerHTML = '<span class="pemoji">'+(h.emoji||"🍽️")+'</span><div class="pinfo"><div class="pfood">'+h.food+'</div><div class="phl">'+h.headline+'</div></div><div class="pbadge" style="background:'+v.pbg+'">'+v.answerEmoji+'</div>';
    pl.appendChild(el);
  });
}
</script>
</body>
</html>
